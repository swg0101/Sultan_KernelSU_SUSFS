name: Build and Release Sultan Kernels

permissions:
  contents: write  # Allow writing to repository contents (for pushing tags)
  actions: write   # Allows triggering actions

on:
  workflow_dispatch:

jobs:
  build-kernel-zumapro:
    uses: ./.github/workflows/sultan.yml
    secrets: inherit
    with:
      codename: "zumapro"
      android_version: "android14"
      kernel_version: "6.1"

  trigger-release:
    runs-on: ubuntu-latest
    needs:
        - build-kernel-zumapro
    env:
      REPO_OWNER: TheWildJames
      REPO_NAME: Sultan_KernelSU_SUSFS
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      RELEASE_NAME: "Sultan Kernels With KernelSU Next & SUSFS v2.0.0"
      RELEASE_NOTES: |
        This release contains KernelSU Next and SUSFS v2.0.0

        ### 📦 Variants Included:
        * **stock**: The pure, unmodified base Sultan kernel. Built straight from source with no extra patches or additions.
        * **wksu**: Includes Wild KernelSU (WKSU) integrated into the kernel. No other modifications.
        * **wksu-susfs**: The ultimate package. Includes Wild KernelSU, SUSFS v2.0.0, and extra custom configurations (Mountify support, networking tweaks, BBR TCP congestion, and IPSet support).

        ⚠️ **COMPATIBILITY NOTICE** ⚠️
        Please ensure compatibility!

        **Sultan Commits Used:**
        -> https://github.com/kerneltoast/android_kernel_google_tensynos/commit/TENSYNOS_HASH

        Module:
        -> https://github.com/sidex15/ksu_module_susfs

        Managers:
        -> https://github.com/WildKernels/Wild_KSU

        Features:
        [+] Wild KSU
        [+] SUSFS v2.0.0

    steps:
      # Checkout the code
      - name: Checkout code
        uses: actions/checkout@v3

      # Get the Latest Tag from GitHub
      - name: Generate and Create New Tag
        run: |
            # Fetch the latest tag from GitHub (this is the latest tag based on the GitHub API)
            LATEST_TAG=$(gh api repos/$REPO_OWNER/$REPO_NAME/tags --jq '.[0].name')
            if [ -z "$LATEST_TAG" ]; then
              LATEST_TAG="v2.0.0-r0"  # Default to v1.5.7-0 if no tag exists
            fi

            # Increment the suffix (e.g., v1.5.7-0 becomes v1.5.7-1)
            NEW_TAG=$(echo "$LATEST_TAG" | awk -F'-r' '{suffix=$2; if (!suffix) suffix=0; suffix++; printf "%s-r%d", $1, suffix}')

            # Output the new tag to be used
            echo "New tag: $NEW_TAG"

            # Set the new tag as an environment variable to be used in later steps
            echo "NEW_TAG=${NEW_TAG}" >> $GITHUB_ENV

            # Create the tag in the repository
            git tag $NEW_TAG
            git push origin $NEW_TAG

      # Download Artifacts for A12 (Only if A12 Build is successful or input is true or empty)
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./downloaded-artifacts

      - name: Fetch and Inject Sultan Commits
        run: |
          TENSYNOS_COMMIT=$(git ls-remote https://github.com/kerneltoast/android_kernel_google_tensynos HEAD | awk '{print $1}')

          # Replace placeholders in RELEASE_NOTES
          UPDATED_NOTES="${RELEASE_NOTES//TENSYNOS_HASH/$TENSYNOS_COMMIT}"

          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "RELEASE_NOTES<<$EOF" >> $GITHUB_ENV
          echo "$UPDATED_NOTES" >> $GITHUB_ENV
          echo "$EOF" >> $GITHUB_ENV

      # Create GitHub Release and upload files if make_release is true
      - name: Create GitHub Release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ env.NEW_TAG }}  # Use the generated tag for the release
          release_name: ${{ env.RELEASE_NAME }}  # Pass the RELEASE_NAME to the action
          body: ${{ env.RELEASE_NOTES }}  # Pass the RELEASE_NOTES to the action
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Release Assets Dynamically
        run: |
          # Loop through all files in the downloaded-artifacts directory
          for file in ./downloaded-artifacts/kernel-*/*; do
              # Skip directories
              if [ -d "$file" ]; then
                  continue
              fi

              # Extract directory, filename, and extension
              dir=$(dirname "$file")
              filename=$(basename "$file")
              name="${filename%.*}"
              ext="${filename##*.}"

              # Append the release tag version to the filename
              new_filepath="$dir/${name}-${{ env.NEW_TAG }}.${ext}"
              mv "$file" "$new_filepath"

              # Upload the renamed file to the GitHub release
              echo "Uploading $new_filepath..."
              gh release upload ${{ env.NEW_TAG }} "$new_filepath"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NEW_TAG: ${{ env.NEW_TAG }}

      # Display Files Uploaded
      - name: Display Files Uploaded
        run: |
          echo "GitHub release created with the following files:"
          ls ./downloaded-artifacts/**/*
